<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f5f5f5;
            --text-color: #1a1a2e;
            --accent-color: #3b82f6;
            --button-bg: #cccccc;
            --hover-color: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .lyrics-container {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .background-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            transition: opacity 0.5s;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            opacity: 1;
            transition: opacity 0.3s;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .song-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: white
        }

        .song-title-num {
            opacity: 0.5;
            margin-right: 0.3em;
            font-variant-numeric: tabular-nums;
        }

        .song-artist {
            font-size: 1rem;
            opacity: 0.7;
            color: white
        }

        .lyrics-content {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 80px;
            min-height: 0;
        }

        .lyrics-text {
            font-size: var(--lyrics-font-size, 3.5rem);
            font-family: var(--lyrics-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
            color: var(--lyrics-text-color, #ffffff);
            text-align: center;
            line-height: var(--lyrics-line-height, 1.4);
            white-space: pre-line;
            user-select: none;
            text-shadow: var(--lyrics-text-shadow, none);
            transition: opacity 0.3s ease;
            font-weight: var(--lyrics-font-weight, normal);
        }

        .lyrics-text.fade-out {
            opacity: 0;
        }

        .page-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 1rem;
            opacity: 0.6;
            z-index: 100;
            transition: opacity 0.3s;
            text-align: center;
            color: white;
        }

        .page-type {
            font-size: 2.5rem;
            opacity: 0.8;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .page-indicator:hover {
            opacity: 1;
        }

        .auto-indicator {
            color: var(--accent-color);
            margin-left: 10px;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 320px;
            height: 100vh;
            background: var(--bg-color);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 200;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.3);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--button-bg);
            color: var(--text-color);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .clear-all-btn {
            padding: 6px 12px;
            background:var(--button-bg);
            border: none;
            border-radius: 6px;
            color:var(--text-color);
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .clear-all-btn:hover {
            background: var(--hover-color);
        }

        .song-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .song-item {
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .song-item:hover {
            background: var(--hover-color);
        }

        .song-item.active {
            background: var(--accent-color);
            color: white;
        }

        .song-item-info {
            flex: 1;
            min-width: 0;
        }

        .song-item-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-item-num {
            display: inline-block;
            min-width: 1.8em;
            margin-right: 6px;
            opacity: 0.5;
            font-variant-numeric: tabular-nums;
        }

        .song-item.active .song-item-num {
            opacity: 0.85;
        }

        .song-item-artist {
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .song-item-delete {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            margin-left: 10px;
            flex-shrink: 0;
        }

        .song-item:hover .song-item-delete {
            opacity: 0.6;
        }

        .song-item-delete:hover {
            opacity: 1 !important;
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
            z-index: 150;
        }

        .overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        

        .shortcuts-hint {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 0.85rem;
            opacity: 0.4;
            text-align: right;
            line-height: 1.6;
        }

        .shortcuts-hint kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: inherit;
        }

        input[type="file"] {
            display: none;
        }

        .settings-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 420px;
            max-width: 90vw;
            max-height: 90vh;
            background: var(--bg-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
            z-index: 250;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .settings-modal.open {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .settings-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .settings-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .settings-body {
            padding: 20px;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .settings-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 15px;
            opacity: 0.7;
        }

        .setting-row {
            margin-bottom: 15px;
        }

        .setting-row:last-child {
            margin-bottom: 0;
        }

        .setting-label {
            display: block;
            font-size: 0.85rem;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .setting-select {
            width: 100%;
            padding: 10px 15px;
            background: var(--hover-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
            cursor: pointer;
        }

        .setting-select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .setting-slider-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .setting-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: var(--hover-color);
            border-radius: 3px;
            cursor: pointer;
        }

        .setting-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
        }

        .setting-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .setting-value {
            min-width: 50px;
            text-align: right;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
        }

        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border: 3px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: var(--accent-color);
            transform: scale(1.1);
        }

        .setting-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
            background: var(--hover-color);
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: var(--accent-color);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch.active::after {
            transform: translateX(22px);
        }

        .shadow-settings {
            margin-top: 15px;
            padding: 15px;
            background: var(--hover-color);
            border-radius: 8px;
            display: none;
        }

        .shadow-settings.visible {
            display: block;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .theme-thumb {
            aspect-ratio: 16/10;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.15s, border-color 0.15s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .theme-thumb:hover {
            transform: scale(1.05);
        }

        .theme-thumb.active {
            border-color: var(--accent-color);
        }

        .theme-thumb-inner {
            width: 100%;
            height: calc(100% - 24px);
        }

        .theme-thumb-name {
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--text-color);
            background: rgba(0,0,0,0.3);
        }

        .bg-settings {
            margin-top: 15px;
            padding: 15px;
            background: var(--hover-color);
            border-radius: 8px;
        }

        .bg-settings.hidden {
            display: none;
        }

        /* ===== Bokeh Effect - Beautiful floating lights ===== */
        .bg-purple-dream,
        .theme-thumb[data-theme="purple-dream"] {
            --bg-purple-dream-1: #583C87;
            --bg-purple-dream-2: #E45A84;
            --bg-purple-dream-3: #FFACAC;
            --p-purple-dream-1: #583C87;
            --p-purple-dream-2: #FFACAC;
            --p-purple-dream-3: #E45A84;
        }

        .bg-purple-dream {
            background: linear-gradient(135deg, var(--bg-purple-dream-1) 0%, var(--bg-purple-dream-2) 50%, var(--bg-purple-dream-3) 100%);
            overflow: hidden;
        }

        .bg-purple-dream .particle {
            width: 36vmin;
            height: 36vmin;
            border-radius: 36vmin;
            backface-visibility: hidden;
            position: absolute;
            animation-name: bokehMove;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        .bg-purple-dream .particle:nth-child(3n+1) { color: var(--p-purple-dream-1); }
        .bg-purple-dream .particle:nth-child(3n+2) { color: var(--p-purple-dream-2); }
        .bg-purple-dream .particle:nth-child(3n)   { color: var(--p-purple-dream-3); }

        .bg-purple-dream .particle:nth-child(1) { top: 12%; left: 45%; animation-duration: 44.8s; animation-delay: -3.5s; transform-origin: 15vw 20vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(2) { top: 67%; left: 23%; animation-duration: 34s; animation-delay: -2.1s; transform-origin: -20vw 25vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(3) { top: 34%; left: 78%; animation-duration: 57.2s; animation-delay: -6.8s; transform-origin: 10vw -15vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(4) { top: 89%; left: 56%; animation-duration: 38.8s; animation-delay: -1.2s; transform-origin: -25vw 10vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(5) { top: 5%; left: 91%; animation-duration: 51.2s; animation-delay: -9.4s; transform-origin: 20vw 30vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(6) { top: 45%; left: 8%; animation-duration: 42s; animation-delay: -4.6s; transform-origin: -15vw -20vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(7) { top: 78%; left: 34%; animation-duration: 52.4s; animation-delay: -7.9s; transform-origin: 5vw 25vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(8) { top: 23%; left: 67%; animation-duration: 31.2s; animation-delay: -0.8s; transform-origin: -10vw 15vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(9) { top: 56%; left: 89%; animation-duration: 60.8s; animation-delay: -5.3s; transform-origin: 25vw -10vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(10) { top: 3%; left: 15%; animation-duration: 47.6s; animation-delay: -8.2s; transform-origin: -20vw -25vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(11) { top: 71%; left: 52%; animation-duration: 37.6s; animation-delay: -2.7s; transform-origin: 15vw 20vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(12) { top: 18%; left: 3%; animation-duration: 50.4s; animation-delay: -3.9s; transform-origin: -5vw 30vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(13) { top: 92%; left: 77%; animation-duration: 35.6s; animation-delay: -6.1s; transform-origin: 10vw -20vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(14) { top: 41%; left: 41%; animation-duration: 58.8s; animation-delay: -1.5s; transform-origin: -15vw 5vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(15) { top: 6%; left: 63%; animation-duration: 40.4s; animation-delay: -7.3s; transform-origin: 20vw 15vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(16) { top: 84%; left: 2%; animation-duration: 54s; animation-delay: -4.8s; transform-origin: -25vw -15vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(17) { top: 29%; left: 95%; animation-duration: 36.8s; animation-delay: -0.3s; transform-origin: 5vw -25vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(18) { top: 63%; left: 19%; animation-duration: 47.2s; animation-delay: -5.9s; transform-origin: -10vw 20vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(19) { top: 47%; left: 74%; animation-duration: 33.2s; animation-delay: -2.4s; transform-origin: 15vw -5vh; box-shadow: 60vmin 0 20vmin currentColor; }
        .bg-purple-dream .particle:nth-child(20) { top: 15%; left: 28%; animation-duration: 63.2s; animation-delay: -8.7s; transform-origin: -20vw 10vh; box-shadow: 60vmin 0 20vmin currentColor; }

        @keyframes bokehMove {
            100% {
                transform: translate3d(0, 0, 1px) rotate(360deg);
            }
        }

            --p-cotton-candy-2: #f472b6;
            --p-cotton-candy-3: #93c5fd;
        }

            },
            'ocean-deep': {
                textColor: textColor_sel,
                textShadow: textShadow_sel,
                backgroundClass: 'bg-ocean-deep'
            },
            'purple-dream': {
                textColor: textColor_sel,
                textShadow: textShadow_sel,
                backgroundClass: 'bg-purple-dream'
            },
            'arctic': {
                textColor: textColor_sel,
                textShadow: textShadow_sel,
                backgroundClass: 'bg-arctic'
            },
            'cotton-candy': {
                textColor: textColor_sel,
                textShadow: textShadow_sel,
                backgroundClass: 'bg-cotton-candy'
            },
            'lavender': {
                textColor: textColor_sel,
                textShadow: textShadow_sel,
                backgroundClass: 'bg-lavender'
            },
            'sunset': {
                textColor: textColor_sel,
                textShadow: textShadow_sel,
                backgroundClass: 'bg-sunset'
            },
            'rose-gold': {
                textColor: textColor_sel,
                textShadow: textShadow_sel,
                backgroundClass: 'bg-rose-gold'
            },
            'skyblue': {
                textColor: textColor_sel,
                textShadow: textShadow_sel,
                backgroundClass: 'bg-skyblue'
            }
        };

        const themeKeys = Object.keys(presetThemes);

        const defaultSettings = {
            fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",
            fontSize: 8,
            lineHeight: 1.5,
            bold: false,
            theme: 'golden-hour'
        };

        let currentSettings = { ...defaultSettings };
        let settingsSaveTimeout = null;

        const elements = {
            lyricsContainer: document.getElementById('lyricsContainer'),
            backgroundLayer: document.getElementById('backgroundLayer'),
            lyricsText: document.getElementById('lyricsText'),
            songTitle: document.getElementById('songTitle'),
            songArtist: document.getElementById('songArtist'),
            pageIndicator: document.getElementById('pageIndicator'),
            header: document.getElementById('header'),
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            songList: document.getElementById('songList'),
            closeSidebar: document.getElementById('closeSidebar'),
            clearAllBtn: document.getElementById('clearAllBtn'),
            fileInput: document.getElementById('fileInput'),
            settingsModal: document.getElementById('settingsModal'),
            settingsOverlay: document.getElementById('settingsOverlay'),
            closeSettings: document.getElementById('closeSettings'),
            fontFamily: document.getElementById('fontFamily'),
            fontSize: document.getElementById('fontSize'),
            fontSizeValue: document.getElementById('fontSizeValue'),
            lineHeight: document.getElementById('lineHeight'),
            lineHeightValue: document.getElementById('lineHeightValue'),
            boldText: document.getElementById('boldText'),
            themeGrid: document.getElementById('themeGrid')
        };

        function loadFromStorage(key) {
            try {
                const stored = localStorage.getItem(key);
                if (stored) {
                    return JSON.parse(stored);
                }
            } catch (e) {
                console.warn('Failed to load from localStorage:', e);
            }
            return null;
        }

        function saveToStorage(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.warn('Failed to save to localStorage:', e);
            }
        }

        function loadSettings() {
            const stored = loadFromStorage(SETTINGS_STORAGE_KEY);
            if (stored) {
                currentSettings = { ...defaultSettings, ...stored };
            }
            applySettings();
        }

        function saveSettings() {
            clearTimeout(settingsSaveTimeout);
            settingsSaveTimeout = setTimeout(() => {
                saveToStorage(SETTINGS_STORAGE_KEY, currentSettings);
            }, 300);
        }

        function applySettings() {
            const root = document.documentElement;
            root.style.setProperty('--lyrics-font-size', `${currentSettings.fontSize}rem`);
            root.style.setProperty('--lyrics-font-family', currentSettings.fontFamily);
            root.style.setProperty('--lyrics-line-height', currentSettings.lineHeight);
            root.style.setProperty('--lyrics-font-weight', currentSettings.bold ? 'bold' : 'normal');

            const theme = presetThemes[currentSettings.theme] || presetThemes['golden-hour'];
            root.style.setProperty('--lyrics-text-color', theme.textColor);
            root.style.setProperty('--lyrics-text-shadow', theme.textShadow);

            const layer = elements.backgroundLayer;
            layer.className = 'background-layer';
            layer.classList.add(theme.backgroundClass);

            if (theme.backgroundClass && theme.backgroundClass.startsWith('bg-')) {
                layer.innerHTML = '';
                for (let i = 0; i < 20; i++) {
                    const span = document.createElement('span');
                    span.className = 'particle';
                    layer.appendChild(span);
                }
            } else {
                layer.innerHTML = '';
            }

            if (elements.fontFamily) elements.fontFamily.value = currentSettings.fontFamily;
            if (elements.fontSize) {
                elements.fontSize.value = currentSettings.fontSize;
                elements.fontSizeValue.textContent = `${currentSettings.fontSize}rem`;
            }
            if (elements.lineHeight) {
                elements.lineHeight.value = currentSettings.lineHeight;
                elements.lineHeightValue.textContent = currentSettings.lineHeight;
            }
            if (elements.boldText) {
                elements.boldText.checked = currentSettings.bold;
            }

            document.querySelectorAll('.theme-thumb').forEach(thumb => {
                thumb.classList.toggle('active', thumb.dataset.theme === currentSettings.theme);
            });
        }

        function openSettings() {
            elements.settingsModal.classList.add('open');
            elements.settingsOverlay.classList.add('visible');
        }

        function toggleSettings() {
            elements.settingsModal.classList.toggle('open');
            elements.settingsOverlay.classList.toggle('visible');
        }

        function closeSettings() {
            elements.settingsModal.classList.remove('open');
            elements.settingsOverlay.classList.remove('visible');
            if (document.activeElement && document.activeElement !== document.body) {
                document.activeElement.blur();
            }
        }

        function loadFiles(files) {
            const jsonFiles = Array.from(files).filter(f => f.name.endsWith('.json'));
            if (jsonFiles.length === 0) return;

            let loadedCount = 0;
            const newSongs = [];

            jsonFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const song = JSON.parse(e.target.result);
                        if (song.title && song.pages && Array.isArray(song.pages)) {
                            newSongs.push(song);
                        }
                    } catch (err) {
                        console.warn('Failed to parse:', file.name, err);
                    }
                    loadedCount++;
                    if (loadedCount === jsonFiles.length) {
                        if (newSongs.length > 0) {
                            const wasEmpty = state.songs.length === 0;
                            state.songs = [...state.songs, ...newSongs];
                            saveToStorage(SONGS_STORAGE_KEY, state.songs);
                            renderSongList();
                            if (wasEmpty) {
                                loadSong(0);
                            }
                        }
                    }
                };
                reader.readAsText(file);
            });
        }

        function initApp() {
            elements.lyricsContainer.style.display = 'flex';
            clearTimeout(state.cursorTimeout);
            state.cursorTimeout = setTimeout(() => {
                document.body.style.cursor = 'none';
            }, 2000);
            renderSongList();
            loadSong(0);
        }

        function setupFileInputListeners() {
            elements.fileInput.addEventListener('change', e => {
                if (e.target.files.length > 0) {
                    loadFiles(e.target.files);
                    e.target.value = '';
                }
            });
        }

        function setupSettingsListeners() {
            elements.closeSettings.addEventListener('click', closeSettings);
            elements.settingsOverlay.addEventListener('click', closeSettings);

            elements.fontFamily.addEventListener('change', e => {
                currentSettings.fontFamily = e.target.value;
                applySettings();
                saveSettings();
            });

            elements.fontSize.addEventListener('input', e => {
                currentSettings.fontSize = parseFloat(e.target.value);
                elements.fontSizeValue.textContent = `${currentSettings.fontSize}rem`;
                applySettings();
                saveSettings();
            });

            elements.lineHeight.addEventListener('input', e => {
                currentSettings.lineHeight = parseFloat(e.target.value);
                elements.lineHeightValue.textContent = currentSettings.lineHeight;
                applySettings();
                saveSettings();
            });

            elements.boldText.addEventListener('change', e => {
                currentSettings.bold = e.target.checked;
                applySettings();
                saveSettings();
            });

            elements.themeGrid.addEventListener('click', e => {
                const thumb = e.target.closest('.theme-thumb');
                if (thumb) {
                    currentSettings.theme = thumb.dataset.theme;
                    applySettings();
                    saveSettings();
                }
            });
        }

        function renderSongList() {
            elements.songList.innerHTML = state.songs.map((song, i) => `
                <div class="song-item ${i === state.currentSongIndex ? 'active' : ''}" data-index="${i}">
                    <div class="song-item-info">
                        <div class="song-item-title"><span class="song-item-num">${i + 1}.</span>${song.title}</div>
                        <div class="song-item-artist">${song.artist || ''}</div>
                    </div>
                    <button class="song-item-delete" data-delete="${i}" title="Delete song">×</button>
                </div>
            `).join('');

            const activeItem = elements.songList.querySelector('.song-item.active');
            if (activeItem) {
                activeItem.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
        }

        function deleteSong(index) {
            state.songs.splice(index, 1);
            saveToStorage(SONGS_STORAGE_KEY, state.songs);
            if (state.songs.length === 0) {
                state.currentSongIndex = 0;
                state.currentPage = 0;
                renderSongList();
                elements.lyricsText.innerHTML = 'No Songs Loaded...';
                elements.songTitle.textContent = '';
                elements.songArtist.textContent = '';
                elements.pageIndicator.textContent = '';
            } else {
                if (state.currentSongIndex >= state.songs.length) {
                    state.currentSongIndex = state.songs.length - 1;
                }
                loadSong(state.currentSongIndex);
            }
        }

        function clearAllSongs() {
            state.songs = [];
            state.currentSongIndex = 0;
            state.currentPage = 0;
            saveToStorage(SONGS_STORAGE_KEY, state.songs);
            renderSongList();
            elements.lyricsText.innerHTML = 'No Songs Loaded...';
            elements.songTitle.textContent = '';
            elements.songArtist.textContent = '';
            elements.pageIndicator.textContent = '';
        }

        function loadSong(index) {
            const song = state.songs[index];
            state.currentSongIndex = index;
            state.currentPage = 0;
            const otherThemes = themeKeys.filter(t => t !== currentSettings.theme);
            currentSettings.theme = otherThemes[Math.floor(Math.random() * otherThemes.length)];
            applySettings();
            saveSettings();
            renderSongList();
            renderPage();
        }

        function renderPage() {
            const song = state.songs[state.currentSongIndex];
            const page = song.pages[state.currentPage];

            elements.lyricsText.innerHTML = page.text;
            elements.songTitle.innerHTML = `<span class="song-title-num">${state.currentSongIndex + 1}.</span>${song.title}`;
            elements.songArtist.textContent = song.artist || '';

            const pageNum = state.currentPage + 1;
            const totalPages = song.pages.length;
            const typeHtml = page.type ? `<span class="page-type">${page.type}</span>` : '';
            elements.pageIndicator.innerHTML = `${typeHtml}<span class="page-num">${pageNum} / ${totalPages}</span>`;
        }

        function nextPage() {
            const song = state.songs[state.currentSongIndex];
            if (state.currentPage < song.pages.length - 1) {
                elements.lyricsText.classList.add('fade-out');
                setTimeout(() => {
                    state.currentPage++;
                    renderPage();
                    elements.lyricsText.classList.remove('fade-out');
                }, 300);
            }
        }

        function prevPage() {
            if (state.currentPage > 0) {
                elements.lyricsText.classList.add('fade-out');
                setTimeout(() => {
                    state.currentPage--;
                    renderPage();
                    elements.lyricsText.classList.remove('fade-out');
                }, 300);
            }
        }

        function toggleSidebar() {
            const isOpen = elements.sidebar.classList.contains('open');
            elements.sidebar.classList.toggle('open', !isOpen);
            elements.overlay.classList.toggle('visible', !isOpen);
        }

        function closeSidebar() {
            elements.sidebar.classList.remove('open');
            elements.overlay.classList.remove('visible');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function showHeader() {
            elements.header.classList.add('visible');
            clearTimeout(state.headerTimeout);
        }

        function setupEventListeners() {
            document.addEventListener('keydown', e => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
                switch(e.key) {
                    case 'ArrowRight':
                    case ' ':
                        e.preventDefault();
                        nextPage();
                        showHeader();
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        prevPage();
                        showHeader();
                        break;
                    case 't':
                    case 'T':
                        toggleSettings();
                        break;
                    case 's':
                    case 'S':
                        toggleSidebar();
                        break;
                    case 'f':
                    case 'F':
                        toggleFullscreen();
                        break;
                    case 'ArrowDown':
                        if (state.currentSongIndex < state.songs.length - 1) {
                            loadSong(state.currentSongIndex + 1);
                            showHeader();
                        }
                        break;
                    case 'ArrowUp':
                        if (state.currentSongIndex > 0) {
                            loadSong(state.currentSongIndex - 1);
                            showHeader();
                        }
                        break;
                    case ']':
                    case '}':
                        {
                            const idx = themeKeys.indexOf(currentSettings.theme);
                            currentSettings.theme = themeKeys[(idx + 1) % themeKeys.length];
                            applySettings();
                            saveSettings();
                        }
                        break;
                    case '[':
                    case '{':
                        {
                            const idx = themeKeys.indexOf(currentSettings.theme);
                            currentSettings.theme = themeKeys[(idx - 1 + themeKeys.length) % themeKeys.length];
                            applySettings();
                            saveSettings();
                        }
                        break;
                    case 'x':
                    case 'X':
                        if (elements.sidebar.classList.contains('open') && state.songs.length > 0) {
                            deleteSong(state.currentSongIndex);
                        }
                        break;
                    case 'Escape':
                        closeSidebar();
                        closeSettings();
                        break;
                }
            });

            elements.lyricsContainer.addEventListener('click', e => {
                if (e.target === elements.lyricsContainer || e.target === elements.lyricsText) {
                    showHeader();
                }
            });

            elements.songList.addEventListener('click', e => {
                const deleteBtn = e.target.closest('.song-item-delete');
                if (deleteBtn) {
                    e.stopPropagation();
                    const index = parseInt(deleteBtn.dataset.delete);
                    deleteSong(index);
                    return;
                }
                const item = e.target.closest('.song-item');
                if (item) {
                    loadSong(parseInt(item.dataset.index));
                    closeSidebar();
                }
            });

            elements.closeSidebar.addEventListener('click', closeSidebar);
            elements.overlay.addEventListener('click', closeSidebar);
            elements.clearAllBtn.addEventListener('click', clearAllSongs);
        }

        function init() {
            setupFileInputListeners();
            setupSettingsListeners();
            setupCursorHide();
            loadSettings();
            document.addEventListener('keydown', e => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
                if (e.key === 'a' || e.key === 'A') {
                    elements.fileInput.click();
                }
            });
            setupEventListeners();
            const stored = loadFromStorage(SONGS_STORAGE_KEY);
            if (stored && stored.length > 0) {
                state.songs = stored;
                initApp();
            }
        }

        function setupCursorHide() {
            document.addEventListener('mousemove', () => {
                document.body.style.cursor = 'auto';
                clearTimeout(state.cursorTimeout);
                state.cursorTimeout = setTimeout(() => {
                    document.body.style.cursor = 'none';
                }, 2000);
            });

            clearTimeout(state.cursorTimeout);
            state.cursorTimeout = setTimeout(() => {
                document.body.style.cursor = 'none';
            }, 2000);
        }

        init();
    </script>
</body>
